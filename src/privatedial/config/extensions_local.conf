;-------------------------------- PrivateDial ----------------------------------
; Filename: extensions_local.conf
; This file is an Asterisk configuration file, part of the PrivateDial suite
; It is included by the extensions.conf file.
;

;-------------------------------- globals --------------------------------------
; include file providing dialing texting options used in context globals
;

;-------------------------------- dialing

[globals]
CONTRY_CODE = 46
DIAL_TIMEOUT =,30

;-------------------------------- voice mail

VOICEMAIL_TEMPLATE =,en_US_email
VOICEMAIL_RECGAINDB =,g(12)

;-------------------------------- entries --------------------------------------
; Calls enter the dialplan in one of these entries
;

[dp_entry_call_inout]
; Extension 1001 is an AI agent: hand the call straight to the aiagent-bridge
; over AudioSocket instead of falling through to sub_dial_term/sub_voicemail.
; Exact-match extensions are matched before the _[+0-9]. pattern in dp_call_inout,
; so this intercepts calls to 1001 without touching that shared logic.
exten => 1001,1,NoOp(Routing call to AI agent on 1001)
 same => n,Answer()
 same => n,AudioSocket(${UUID()},127.0.0.1:9092)
 same => n,Hangup()

[dp_entry_call_in]

[dp_entry_text_inout]

[dp_entry_text_in]

[dp_entry_answer]
